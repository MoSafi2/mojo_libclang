# Input files as generated by `mojo doc`.
input:
  - docs/src

# Source directories to monitor when running in watch mode.
source:
  - clang

# Full URLs of package sources. Used to create source links.
source-url:
  clang: https://github.com/MoSafi2/mojo_libclang/blob/master/clang

# Output directory.
output: docs/site/src/content/docs/api

# Disable doc-tests for the initial documentation pipeline.
tests: ""

# Output format. Starlight consumes Modo's Markdown tree after frontmatter is added.
format: plain

# Re-structure docs according to package re-exports.
exports: true

# Use shortened cross-ref link labels.
short-links: true

# Report missing docstrings and coverage, but do not fail the build on warnings yet.
report-missing: true
strict: false

# Run without generating any output files.
dry-run: false

# Build for systems that are not case-sensitive regarding file names.
case-insensitive: false

templates: []

pre-run:
  - |
    echo Running 'mojo doc'...
    mkdir -p docs/src
    pixi run mojo doc -o docs/src/clang.json clang
    echo Done.

pre-build: []
pre-test: []
post-test: []
post-build: []
post-run: []
