[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["conda-forge", "https://conda.modular.com/max"]
name = "mojo_libclang"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
generate-libclang = "python scripts/generate_libclang_bindings.py"
run-test = "mojo run -I . -Xlinker -L$PWD/build -Xlinker -lclang_mojo_shim"
build-test = "mojo build -I . -Xlinker -L$PWD/build -Xlinker -lclang_mojo_shim"

[dependencies]
python = ">=3.14.5,<3.15"
mojo = ">=1.0.0b1,<2"

[pypi-dependencies]
mojo-bindgen = { git = "git+https://github.com/MoSafi2/mojo_bindgen" }
