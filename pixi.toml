[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["conda-forge", "https://conda.modular.com/max", "https://repo.prefix.dev/modular-community"]
name = "mojo_libclang"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
preview = ["pixi-build"]
version = "0.1.0"

[package]
name = "libclang_mojo"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.*", channels = ["conda-forge", "https://conda.modular.com/max"] }

[package.build.config.pkg]
name = "clang"
path = "clang"

[package.host-dependencies]
mojo-compiler = "=1.0.0b2"

[package.build-dependencies]
mojo-compiler = "=1.0.0b2"

[package.run-dependencies]
mojo-compiler = "=1.0.0b2"

[tasks]
generate = "python scripts/generate_libclang_bindings.py"
generate-libclang = "python scripts/generate_libclang_bindings.py"
build-package = "bash scripts/build_package_layout.sh dist/libclang_mojo-prefix"
render-recipe = "bash scripts/build_recipe.sh --render-only"
build-recipe = "bash scripts/build_recipe.sh"
upload-recipe = "bash scripts/upload_recipe.sh"
run-test = "env LD_LIBRARY_PATH=$PWD/shim:$PWD/.pixi/envs/default/lib:$LD_LIBRARY_PATH mojo run -I . -Xlinker -L$PWD/shim -Xlinker -lclang_mojo_shim"
build-test = "env LD_LIBRARY_PATH=$PWD/shim:$PWD/.pixi/envs/default/lib:$LD_LIBRARY_PATH mojo build -I . -Xlinker -L$PWD/shim -Xlinker -lclang_mojo_shim"

[dependencies]
python = ">=3.14.5,<3.15"
mojo = ">=1.0.0b2,<2"
clangdev = "18.*"
libclang = "18.*"
rattler-build = ">=0.67.0,<0.68"

[pypi-dependencies]
mojo-bindgen = { git = "git+https://github.com/MoSafi2/mojo_bindgen", rev = "1aa815c210a4435cc5fc9e940f701ff0a902b945" }
