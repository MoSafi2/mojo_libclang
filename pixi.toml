[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["conda-forge", "https://conda.modular.com/max"]
name = "mojo_libclang"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
generate-libclang = "python scripts/generate_libclang_bindings.py"
all-tests = "mojo run -I src test/all_tests.mojo"
test = 'mojo run -I src -Xlinker -L$PWD/build -Xlinker -Wl,-rpath,$PWD/build -Xlinker -Wl,-rpath,$PWD/.pixi/envs/default/lib/python3.14/site-packages/clang/native'

[dependencies]
python = ">=3.14.5,<3.15"
mojo = ">=1.0.0b1,<2"

[pypi-dependencies]
mojo-bindgen = { git = "git+https://github.com/MoSafi2/mojo_bindgen" }
