[workspace]
authors = ["MoSafi2 <mohamed.mabrouk@rwth-aachen.de>"]
channels = ["conda-forge", "https://conda.modular.com/max"]
name = "mojo_libclang"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
generate = "python scripts/generate_libclang_bindings.py"
generate-libclang = "python scripts/generate_libclang_bindings.py"
smoke-test = "mojo run -I src test/smoke.mojo"
raw-ffi-probe = "mojo run -I src test/raw_ffi_probe.mojo"

[dependencies]
python = ">=3.14.5,<3.15"
mojo = ">=1.0.0b1,<2"

[pypi-dependencies]
mojo-bindgen = ">=0.3.1, <0.4"
